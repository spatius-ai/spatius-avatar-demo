name: AvatarDemo
options:
  bundleIdPrefix: ai.spatius.demo
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"

targets:
  AvatarDemo:
    type: application
    platform: iOS
    sources:
      - AvatarDemo
    settings:
      base:
        INFOPLIST_FILE: AvatarDemo/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: ai.spatius.demo.AvatarDemo
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        OTHER_LDFLAGS: ["-lz", "-lc++"]
      configs:
        debug:
          FRAMEWORK_SEARCH_PATHS[sdk=iphoneos*]: "$(PROJECT_DIR)/AvatarKit.xcframework/ios-arm64"
          FRAMEWORK_SEARCH_PATHS[sdk=iphonesimulator*]: "$(PROJECT_DIR)/AvatarKit.xcframework/ios-arm64-simulator"
        release:
          FRAMEWORK_SEARCH_PATHS[sdk=iphoneos*]: "$(PROJECT_DIR)/AvatarKit.xcframework/ios-arm64"
          FRAMEWORK_SEARCH_PATHS[sdk=iphonesimulator*]: "$(PROJECT_DIR)/AvatarKit.xcframework/ios-arm64-simulator"
    dependencies:
      - framework: AvatarKit.xcframework
        embed: false
    preBuildScripts:
      - name: Download AvatarKit
        script: |
          set -e

          FRAMEWORK_PATH="${PROJECT_DIR}/AvatarKit.xcframework"
          ZIP_PATH="${PROJECT_DIR}/AvatarKit.xcframework.zip"
          CHECKSUM_FILE="${PROJECT_DIR}/.avatarkit_checksum"
          SPATIUS_AVATARKIT_IOS_URL="${SPATIUS_AVATARKIT_IOS_URL:-https://github.com/spatius-ai/avatarkit-ios-release/releases/download/v1.0.0/AvatarKit_202605190156.zip}"
          SPATIUS_AVATARKIT_IOS_CHECKSUM="${SPATIUS_AVATARKIT_IOS_CHECKSUM:-332f1826a9872adfe0f0b21ecbf364b72491aac3bb71238eb9808a2620df1563}"

          NEED_DOWNLOAD=false

          if [ ! -d "$FRAMEWORK_PATH" ]; then
              NEED_DOWNLOAD=true
          elif [ ! -f "$CHECKSUM_FILE" ]; then
              NEED_DOWNLOAD=true
          elif [ "$(cat "$CHECKSUM_FILE")" != "$SPATIUS_AVATARKIT_IOS_CHECKSUM" ]; then
              NEED_DOWNLOAD=true
          else
              echo "AvatarKit.xcframework is up to date."
              exit 0
          fi

          if [ "$NEED_DOWNLOAD" = true ]; then
              if [ -z "$SPATIUS_AVATARKIT_IOS_URL" ] || [ -z "$SPATIUS_AVATARKIT_IOS_CHECKSUM" ]; then
                  echo "Spatius iOS SDK release artifact is not configured."
                  echo "Set SPATIUS_AVATARKIT_IOS_URL and SPATIUS_AVATARKIT_IOS_CHECKSUM before building."
                  exit 1
              fi
              echo "Downloading AvatarKit.xcframework..."
              if ! curl -L -f -o "$ZIP_PATH" "$SPATIUS_AVATARKIT_IOS_URL"; then
                  echo "Error: Failed to download"
                  exit 1
              fi
              ACTUAL_CHECKSUM=$(shasum -a 256 "$ZIP_PATH" | awk '{print $1}')
              if [ "$ACTUAL_CHECKSUM" != "$SPATIUS_AVATARKIT_IOS_CHECKSUM" ]; then
                  echo "Checksum mismatch!"
                  rm -f "$ZIP_PATH"
                  exit 1
              fi
              [ -d "$FRAMEWORK_PATH" ] && rm -rf "$FRAMEWORK_PATH"
              unzip -q -o "$ZIP_PATH" -d "$PROJECT_DIR"
              rm -f "$ZIP_PATH"
              echo "$SPATIUS_AVATARKIT_IOS_CHECKSUM" > "$CHECKSUM_FILE"
              echo "AvatarKit.xcframework installed."
          fi
    postBuildScripts:
      - name: Copy AvatarKit Resources
        script: |
          XCFRAMEWORK_PATH="${PROJECT_DIR}/AvatarKit.xcframework"
          if [ "${PLATFORM_NAME}" = "iphonesimulator" ]; then
            ARCH_DIR="ios-arm64-simulator"
          else
            ARCH_DIR="ios-arm64"
          fi
          RESOURCE_BUNDLE="${XCFRAMEWORK_PATH}/${ARCH_DIR}/AvatarKit.framework/Resources/AvatarKitResources.bundle"
          if [ -d "${RESOURCE_BUNDLE}" ]; then
            cp -R "${RESOURCE_BUNDLE}" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/"
          else
            echo "Warning: AvatarKitResources.bundle not found at ${RESOURCE_BUNDLE}"
          fi
